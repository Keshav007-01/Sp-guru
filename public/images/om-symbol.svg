<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .om-symbol {
      fill: #F2A81D;
      stroke: #F2A81D;
      stroke-width: 2;
      animation: pulse 4s infinite ease-in-out;
    }
    .outer-circle {
      fill: none;
      stroke: #F2A81D;
      stroke-width: 3;
      stroke-dasharray: 10, 5;
      animation: rotate 60s infinite linear;
      transform-origin: center;
      opacity: 0.6;
    }
    .inner-circle {
      fill: none;
      stroke: #F2A81D;
      stroke-width: 2;
      stroke-dasharray: 5, 3;
      animation: rotate 30s infinite linear reverse;
      transform-origin: center;
      opacity: 0.8;
    }
  </style>
  
  <!-- Background circles -->
  <circle cx="250" cy="250" r="240" class="outer-circle" />
  <circle cx="250" cy="250" r="200" class="inner-circle" />
  
  <!-- Om Symbol -->
  <path class="om-symbol" d="M250 100
    C290 100, 330 120, 350 160
    C370 200, 370 260, 340 300
    C310 340, 260 360, 210 340
    C180 330, 160 300, 160 270
    C160 240, 180 210, 210 200
    C240 190, 270 200, 290 220
    C310 240, 320 280, 300 310
    C280 340, 240 350, 210 330
    C190 320, 180 290, 190 270
    C200 250, 220 240, 240 250
    C260 260, 270 290, 250 310
    
    M250 310
